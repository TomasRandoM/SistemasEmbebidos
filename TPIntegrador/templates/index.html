<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino TV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"  integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10">
                <div class="ratio ratio-16x9 shadow-lg">
                    <iframe id="videoYT" src="https://www.youtube.com/embed/PHGwHp86Y1o" title="YouTube video" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
                <div class="d-flex justify-content-center align-items-center mt-5 gap-4">
                    <button id="btnLeft" class="btn btn-outline-light btn-lg rounded-circle">
                        <i class="bi bi-arrow-left"></i>
                    </button>
                    <div class="bg-secondary bg-opacity-25 px-4 py-2 rounded-pill">
                        <span class="h4 mb-0 fw-bold">Canal: <span id="channel">X</span></span>
                    </div>
                    <button id="btnRight" class="btn btn-outline-light btn-lg rounded-circle">
                        <i class="bi bi-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
