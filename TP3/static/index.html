<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Eventos Arduino</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f2f4f8;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:600px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.buttons{
    text-align:center;
    margin-bottom:20px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:6px;
    font-size:14px;
    cursor:pointer;
}

.ntp{ background:#007bff; color:white; }
.show{ background:#28a745; color:white; }
.clear{ background:#dc3545; color:white; }

button:hover{
    opacity:0.85;
}

#horaActual{
    text-align:center;
    font-size:18px;
    margin-bottom:15px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th{
    background:#f0f0f0;
}

</style>
</head>

<body>

<div class="container">

<h1>Eventos del Sistema</h1>

<div id="horaActual">Hora: ---</div>

<div class="buttons">
<button class="ntp" onclick="actualizarHora()">Actualizar hora desde servidor NTP</button>
<button class="show" onclick="mostrarEventos()">Mostrar eventos ocurridos</button>
<button class="clear" onclick="borrarEEPROM()">Borrar EEPROM</button>
</div>

<table>
<thead>
<tr>
<th>Evento</th>
<th>Hora UTC</th>
</tr>
</thead>

<tbody id="tablaEventos">
</tbody>

</table>

</div>

<script>

function actualizarHora(){
    fetch("/updateTime")
    .then(res => res.json())
    .then(data => {

        document.getElementById("horaActual").innerText = "Hora: " + data.time;
    });
}

function mostrarEventos(){
    fetch("/getEEPROM")
    .then(res => res.json())
    .then(data => {

        let tabla = document.getElementById("tablaEventos");
        tabla.innerHTML = "";

        data.forEach(evento => {

            let fila = `
            <tr>
                <td>${evento.pin}</td>
                <td>${evento.timestamp}</td>
            </tr>
            `;

            tabla.innerHTML += fila;
        });

    });
}

function borrarEEPROM(){
    fetch("/deleteEEPROM")
    .then(res => res.text())
    .then(() => {

        document.getElementById("tablaEventos").innerHTML = "";
        alert("EEPROM borrada");

    });
}

</script>

</body>
</html>
